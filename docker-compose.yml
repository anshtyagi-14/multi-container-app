version: "3.8"
services:
  app-blue:
    image: ansh144/todo-app:v1
    container_name: app-blue
    ports:
      - "3001:3000"

  app-green:
    image: ansh144/todo-app:v2
    container_name: app-green
    ports:
      - "3002:3000"

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./frontend/build:/usr/share/nginx/html
    depends_on:
      - app
    restart: always

volumes:
  mongo-data: