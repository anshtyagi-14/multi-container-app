events {}

http {
    upstream backend {
        #server app-blue:3000;
        server app-green:3000;
    }
    server {
        listen 80;

        # Frontend (React)
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri /index.html;
        }

        # Backend API
        location /todos {
            proxy_pass http://app:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}